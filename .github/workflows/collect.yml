name: Festival Data Collector

on:
  schedule:
    - cron: '0 15 * * *'   # 매일 자정 KST (UTC 15:00)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify file
        run: head -5 collect.py && echo "---" && pip list | grep -i supa || echo "supabase not installed"

      - name: Run collector
        run: python collect.py
